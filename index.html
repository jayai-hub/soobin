<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>공부방 시스템 V27.8 (Professional Grade)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6">데이터 관리자 페이지 (V27.8)</h1>
        
        <!-- 입력 영역 -->
        <div id="editor-area" class="space-y-4">
            <input type="text" id="admin-title" class="w-full border p-3 rounded" placeholder="제목">
            <textarea id="admin-content" class="w-full border p-3 rounded h-48" placeholder="내용"></textarea>
            
            <button id="save-btn" onclick="performFullSync()" 
                    class="w-full bg-indigo-600 text-white font-bold py-4 rounded-lg hover:bg-indigo-700 transition">
                💾 서버 데이터 강제 동기화
            </button>
        </div>
        
        <div id="debug-log" class="mt-6 p-4 bg-black text-green-400 font-mono text-sm rounded hidden"></div>
    </div>

    <script>
        const BIN_ID = "6a005e56adc21f119a7c1f86";
        const MASTER_KEY = "$2a$10$0IMIZdF3/BKscfzxvO6MuepHI4f3d2VXiIus8mfSCo1FIPXoZVFQ.";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        
        // 데이터 상태 객체
        let db = { title: "", content: "" };

        // 1. 초기 데이터 로딩
        async function initApp() {
            try {
                const res = await fetch(API_URL, {
                    headers: { "X-Master-Key": MASTER_KEY, "Cache-Control": "no-cache" }
                });
                const result = await res.json();
                db = result.record;
                
                // DOM 매핑
                document.getElementById('admin-title').value = db.title || "";
                document.getElementById('admin-content').value = db.content || "";
                console.log("데이터 로드 성공:", db);
            } catch (e) {
                alert("서버 연결 실패: " + e.message);
            }
        }

        // 2. [핵심] UI 데이터를 DB 객체로 강제 갱신 (Mapping)
        function updateDBFromUI() {
            db.title = document.getElementById('admin-title').value;
            db.content = document.getElementById('admin-content').value;
            console.log("DB 객체 동기화 완료:", db);
        }

        // 3. [핵심] 완전 동기화 프로세스
        async function performFullSync() {
            const btn = document.getElementById('save-btn');
            
            // A. 입력값을 객체로 가져옴
            updateDBFromUI();

            // B. 데이터 유효성 체크
            if (!db.title) {
                alert("⚠️ 제목이 비어있습니다. 데이터를 확인하세요.");
                return;
            }

            btn.innerText = "서버 전송 중...";
            btn.disabled = true;

            try {
                // C. 서버 PUT 요청
                const response = await fetch(API_URL, {
                    method: "PUT",
                    headers: { 
                        "Content-Type": "application/json", 
                        "X-Master-Key": MASTER_KEY 
                    },
                    body: JSON.stringify(db)
                });

                const result = await response.json();
                
                // D. 응답 검증
                if (response.ok) {
                    alert("✅ 데이터가 성공적으로 클라우드에 고정되었습니다.");
                    window.location.reload(); // 캐시 무시 강제 새로고침
                } else {
                    throw new Error("서버에서 쓰기 거부: " + JSON.stringify(result));
                }
            } catch (e) {
                console.error("저장 에러:", e);
                alert("❌ 저장 실패: " + e.message);
                btn.innerText = "💾 서버 데이터 강제 동기화";
                btn.disabled = false;
            }
        }

        // 실행
        initApp();
    </script>
</body>
</html>
