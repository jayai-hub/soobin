<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 수제비 선생님 공부방 V28</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdf2f8; color: #333; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.95); border-radius: 1.5rem; border: 1px solid rgba(255, 192, 203, 0.3); }
        .btn-primary { background: linear-gradient(45deg, #ff75c3, #ffad71); color: white; border:none; border-radius: 1rem; cursor: pointer; }
        .grid-btn { background: white; border: 2px solid #fbcfe8; border-radius: 1rem; padding: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; position: relative; z-index: 10; text-align: center; }
        .grid-btn:hover { background-color: #fce7f3; transform: translateY(-2px); }
        .summary-box { white-space: pre-wrap; line-height: 1.8; font-size: 1.05rem; }
        .highlight { background-color: #fff3cd; padding: 2px 5px; border-radius: 4px; font-weight: bold; color: #92400e; }
        .fit-img { width: 100%; height: auto; max-height: 250px; object-fit: contain; background-color: #fff; border-radius: 1.5rem; margin-bottom: 1rem; pointer-events: none; }
        .soobin-bubble { background: #fff; border: 2px solid #fbcfe8; border-radius: 1rem; padding: 15px; margin-bottom: 20px; font-size: 0.95rem; color: #db2777; font-weight: bold; text-align: center; }
        .hidden { display: none !important; }
        .result-card { position: fixed; inset: 0; background: rgba(255,255,255,0.97); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff75c3; }
        input:checked + .slider:before { transform: translateX(26px); }
        .admin-select-active { background-color: #fbcfe8 !important; border-color: #db2777 !important; font-weight: bold; }
    </style>
</head>
<body onload="loadFromCloud()">
    
    <nav class="p-4 flex justify-between items-center max-w-4xl mx-auto">
        <h1 class="text-xl font-bold text-pink-500 flex items-center gap-2" onclick="goHomeFirstPage()" style="cursor:pointer">
            ✨ 수제비 선생님
        </h1>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5 bg-yellow-100 text-amber-600 px-3 py-1 rounded-full font-bold text-sm border border-yellow-200 shadow-sm">
                <i class="fa-solid fa-star text-yellow-500 animate-pulse"></i>
                <span id="nav-stars">0</span>
            </div>
            <button onclick="goHomeFirstPage()" class="text-pink-400 p-1 hover:text-pink-600 transition-colors" title="回到首頁">
                <i class="fa-solid fa-house text-2xl"></i>
            </button>
            <button onclick="checkPassword()" class="text-pink-300 p-1 hover:text-pink-500 transition-colors"><i class="fa-solid fa-gear text-2xl"></i></button>
        </div>
    </nav>

    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <div class="animate-spin text-4xl text-pink-500 mb-4"><i class="fa-solid fa-circle-notch"></i></div>
        <p class="text-pink-500 font-bold">同步中...</p>
    </div>

    <div id="result-overlay" class="result-card hidden">
        <h2 class="text-3xl font-bold text-pink-600 mb-2">測試結束！</h2>
        <div class="relative my-4">
            <div id="score-circle" class="text-7xl font-black text-gray-800 bg-pink-100 w-36 h-36 rounded-full flex items-center justify-center border-4 border-pink-400 shadow-inner font-mono">100</div>
            <div id="perfect-badge" class="absolute -bottom-2 -right-2 bg-yellow-400 text-white p-2 rounded-full text-xs font-black shadow-lg hidden"><i class="fa-solid fa-trophy"></i> PERFECT!</div>
        </div>
        
        <div id="star-gain-alert" class="text-amber-600 font-bold text-sm bg-yellow-50 px-4 py-2 rounded-full border border-yellow-200 mb-4 flex items-center gap-1.5 hidden">
            <i class="fa-solid fa-star text-yellow-500 text-base animate-bounce"></i> 獲得了 1 顆努力奮鬥之星！🌟
        </div>
        <p id="score-msg" class="text-base font-bold text-gray-600 mb-8 whitespace-pre-line max-w-xs leading-relaxed"></p>
        
        <div id="result-actions" class="w-full space-y-3 max-w-xs">
            <button onclick="closeResult()" class="btn-primary w-full py-4 font-bold text-lg shadow-md">返回大本營</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 md:px-6 pb-20">
        
        <section id="page-grades" class="max-w-md mx-auto">
            <div id="app-img-container" class="mb-4"></div>
            <div class="soobin-bubble">"今天也要跟我一起加油學習喔！🌱<br>目前我們已經累積了 <span id="welcome-stars" class="text-amber-500 font-black">0</span> 顆奮鬥之星囉！<br>今天想先看哪個年級呢？"</div>
            <div class="grid grid-cols-2 gap-4" id="grade-buttons-container"></div>
        </section>

        <section id="page-subjects" class="hidden max-w-md mx-auto">
            <div id="grade-img-container" class="mb-4"></div>
            <button onclick="showPage('page-grades')" class="text-sm text-pink-400 underline font-bold mb-4 inline-block">⬅️ 返回年級選擇</button>
            <h2 id="grade-title" class="text-xl font-bold text-gray-800 mb-6 text-center"></h2>
            <div class="grid grid-cols-2 gap-4" id="subject-buttons-container"></div>
        </section>

        <section id="page-semesters" class="hidden max-w-md mx-auto">
            <div id="subject-img-container" class="mb-4"></div>
            <button onclick="showPage('page-subjects')" class="text-sm text-pink-400 underline font-bold mb-4 inline-block">⬅️ 返回科目選擇</button>
            <h2 id="subject-title" class="text-xl font-bold text-gray-800 mb-6 text-center"></h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectSemester('上學期')" class="grid-btn">🍁 上學期</button>
                <button onclick="selectSemester('下學期')" class="grid-btn">🌸 下學期</button>
            </div>
        </section>

        <section id="page-exams" class="hidden max-w-md mx-auto">
            <div id="semester-img-container" class="mb-4"></div>
            <button onclick="showPage('page-semesters')" class="text-sm text-pink-400 underline font-bold mb-4 inline-block">⬅️ 返回學期選擇</button>
            <h2 id="semester-title" class="text-xl font-bold text-gray-800 mb-6 text-center"></h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="selectExam('第一段考')" class="grid-btn">✍️ 第一段考</button>
                <button onclick="selectExam('第二段考')" class="grid-btn">✍️ 第二段考</button>
                <button onclick="selectExam('第三段考')" class="grid-btn">✍️ 第三段考</button>
            </div>
        </section>

        <section id="page-home" class="hidden">
            <div class="text-center max-w-md mx-auto">
                <div id="sub-img-container" class="mb-4"></div>
                <button onclick="showPage('page-exams')" class="text-sm text-pink-400 underline font-bold mb-4 inline-block">⬅️ 返回段考選擇</button>
                <h2 id="welcome-msg" class="text-2xl font-bold text-gray-800 mb-6"></h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                
                <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-pink-100 flex flex-col">
                    <div class="border-b-2 border-pink-50 pb-3 mb-5">
                        <h3 class="text-xl font-bold text-pink-600 flex items-center gap-2">
                            📁 單元精熟學習
                        </h3>
                        <p class="text-xs text-gray-400 mt-1">請選擇單元進行觀念複習與測驗</p>
                    </div>
                    <div id="unit-list-container" class="space-y-3 flex-1"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-purple-100 flex flex-col">
                    <div class="border-b-2 border-purple-50 pb-3 mb-5">
                        <h3 class="text-xl font-bold text-purple-600 flex items-center gap-2">
                            📝 歷屆全範圍考古題
                        </h3>
                        <p class="text-xs text-gray-400 mt-1">針對此段考範圍進行模擬實戰</p>
                    </div>
                    <div id="exam-papers-container" class="space-y-3 flex-1"></div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mt-8 max-w-md mx-auto">
                <button onclick="startReview('normal')" class="glass p-4 text-left border-2 border-pink-200 hover:bg-pink-50 transition-colors">
                    <div class="text-sm font-bold text-pink-600 mb-1">📒 診斷錯題本</div>
                    <p id="review
