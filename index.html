<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 閃耀秀彬教練 V28.1 (최적화 풀버전)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdf2f8; }
        .glass { background: rgba(255, 255, 255, 0.95); border-radius: 1rem; border: 1px solid #fbcfe8; }
        .hidden { display: none !important; }
        .btn-primary { background: #ec4899; color: white; padding: 1rem; border-radius: 0.75rem; font-weight: bold; }
        .grid-btn { background: white; border: 2px solid #fbcfe8; border-radius: 1rem; padding: 1rem; font-weight: bold; }
    </style>
</head>
<body onload="loadFromCloud()">

    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-50">
        <div class="text-pink-500 font-bold text-xl">資料載入中...</div>
    </div>

    <main class="max-w-2xl mx-auto p-4">
        <!-- 메인 페이지 -->
        <section id="page-home" class="hidden">
            <h1 class="text-2xl font-bold text-pink-600 text-center mb-6">✨ 閃耀秀彬教練</h1>
            <div id="exam-papers-container" class="space-y-3"></div>
            <button onclick="checkPassword()" class="mt-8 w-full p-2 text-gray-300 text-xs text-center">後台管理</button>
        </section>

        <!-- 관리자 모달 -->
        <section id="page-admin" class="hidden fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">🐰 後台 (V28.1)</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold">考古題 JSON</label>
                    <textarea id="input-paper-json" class="w-full h-40 p-2 border rounded-lg font-mono text-xs"></textarea>
                </div>
                <button onclick="saveToCloud()" class="w-full py-4 bg-black text-white font-bold rounded-xl">💾 저장 및 클라우드 동기화</button>
                <button onclick="document.getElementById('page-admin').classList.add('hidden')" class="w-full py-2 text-gray-500">닫기</button>
            </div>
        </section>
    </main>

    <script>
        const BIN_ID = "6a005e56adc21f119a7c1f86";
        const MASTER_KEY = "$2a$10$0IMIZdF3/BKscfzxvO6MuepHI4f3d2VXiIus8mfSCo1FIPXoZVFQ.";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        
        let db = { grades: { "7": { subjects: { "自然": { semesters: { "上學期": { exams: { "第一段考": { examPapers: [] } } } } } } } } };

        async function loadFromCloud() {
            try {
                const res = await fetch(API_URL, { headers: { "X-Master-Key": MASTER_KEY }, cache: 'no-store' });
                const data = await res.json();
                db = data.record;
                renderHome();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('page-home').classList.remove('hidden');
            } catch (e) {
                alert("로드 실패: 새로고침 해주세요.");
            }
        }

        function renderHome() {
            // 현재 타겟 경로 (7학년 자연 상학기 1단과 기준)
            const eObj = db.grades["7"].subjects["自然"].semesters["上學期"].exams["第一段考"];
            const cont = document.getElementById('exam-papers-container');
            cont.innerHTML = '';
            
            if (eObj.examPapers && eObj.examPapers.length > 0) {
                eObj.examPapers.forEach(p => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-purple-50 rounded-xl border border-purple-100 font-bold text-purple-800";
                    div.innerHTML = `${p.school} (${p.questions.length}題)`;
                    cont.appendChild(div);
                });
            } else {
                cont.innerHTML = '<p class="text-center text-gray-400">데이터가 없습니다.</p>';
            }
        }

        async function saveToCloud() {
            try {
                const jsonStr = document.getElementById('input-paper-json').value;
                const eObj = db.grades["7"].subjects["自然"].semesters["上學期"].exams["第一段考"];
                
                // 데이터 업데이트
                eObj.examPapers = JSON.parse(jsonStr.replace(/'/g, '"'));
                
                const res = await fetch(API_URL, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                    body: JSON.stringify(db)
                });
                
                if(res.ok) {
                    alert("성공적으로 저장되었습니다! 🚀");
                    location.reload();
                }
            } catch (e) {
                alert("저장 실패: JSON 형식을 확인하세요.");
            }
        }

        function checkPassword() { if(prompt("비밀번호:") === "1234") document.getElementById('page-admin').classList.remove('hidden'); }
    </script>
</body>
</html>
