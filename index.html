<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閃耀秀彬教練 V28.2 (Full Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdf2f8; }
    </style>
</head>
<body onload="init()">

    <div id="app" class="max-w-2xl mx-auto p-4">
        <h1 class="text-2xl font-bold text-center mb-6 text-pink-600">閃耀秀彬教練</h1>
        <div id="content" class="space-y-4"></div>
        
        <!-- 디버깅 영역: 내용이 안 보일 때 확인용 -->
        <div id="debug-info" class="mt-10 p-4 bg-gray-100 text-xs text-gray-500 rounded hidden"></div>
        
        <button onclick="checkAdmin()" class="mt-10 w-full text-gray-300 text-xs">관리자 로그인</button>
    </div>

    <script>
        const BIN_ID = "6a005e56adc21f119a7c1f86";
        const MASTER_KEY = "$2a$10$0IMIZdF3/BKscfzxvO6MuepHI4f3d2VXiIus8mfSCo1FIPXoZVFQ.";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        
        let db = null;

        async function init() {
            try {
                const res = await fetch(API_URL, { headers: { "X-Master-Key": MASTER_KEY }, cache: 'no-store' });
                const data = await res.json();
                db = data.record;
                renderContent();
            } catch (e) {
                document.getElementById('content').innerHTML = "서버 연결 실패. 인터넷을 확인하세요.";
            }
        }

        function renderContent() {
            const cont = document.getElementById('content');
            const debug = document.getElementById('debug-info');
            
            // 데이터 경로 탐색 (이 부분이 실제 저장된 경로와 일치해야 합니다)
            try {
                // 1. 전체 구조가 정상인지 체크
                if (!db || !db.grades) {
                    debug.classList.remove('hidden');
                    debug.innerText = "데이터가 비어있거나 구조가 잘못되었습니다.";
                    return;
                }

                // 2. 현재 선택된 경로 데이터 추출 (수정 가능)
                const currentData = db.grades["7"]?.subjects["自然"]?.semesters["上學期"]?.exams["第一段考"]?.examPapers;

                if (!currentData || currentData.length === 0) {
                    cont.innerHTML = '<p class="text-center text-gray-400">尚無考古題資料</p>';
                    debug.classList.remove('hidden');
                    debug.innerText = "디버깅: 데이터 경로에 접근했으나 examPapers가 비어있습니다.";
                } else {
                    currentData.forEach((p, idx) => {
                        const btn = document.createElement('div');
                        btn.className = "p-4 bg-white rounded-xl shadow border border-pink-100 font-bold";
                        btn.innerHTML = `${p.school || '시험지'} - ${p.questions?.length || 0}문제`;
                        cont.appendChild(btn);
                    });
                }
            } catch (e) {
                debug.classList.remove('hidden');
                debug.innerText = "에러 발생: " + e.message;
            }
        }

        function checkAdmin() {
            if(prompt("비밀번호") === "1234") {
                const json = prompt("JSON 데이터 입력");
                if(json) saveToCloud(json);
            }
        }

        async function saveToCloud(jsonStr) {
            try {
                const parsed = JSON.parse(jsonStr);
                // 데이터를 특정 경로에 강제로 할당
                db.grades["7"].subjects["自然"].semesters["上學期"].exams["第一段考"].examPapers = parsed;
                
                const res = await fetch(API_URL, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                    body: JSON.stringify(db)
                });
                if(res.ok) { alert("저장 성공!"); location.reload(); }
            } catch (e) { alert("JSON 형식 에러: " + e.message); }
        }
    </script>
</body>
</html>
