<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 수제비 선생님-V27</title>
    
    <!-- 인프라 인젝션 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 수빈 스타일 전용 폰트 구성 -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif;
            background-color: #f8fafc; /* 수빈 고유의 화사한 배경색 슬레이트 50 */
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // =========================================================================
        // [V27 데이터 구조] 이원화 병렬 아키텍처 연동형
        // =========================================================================
        const initialExamData = {
            examTitle: "第三次段考",
            units: [
                { id: "u1", name: "單元 5：統計圖表與數據分析" },
                { id: "u2", name: "單元 6：機率與生活應用" }
            ],
            examPapers: [
                {
                    id: "paper_1",
                    schoolYear: "112",
                    publisher: "翰林",
                    schoolName: "景美國中",
                    questions: [{ id: "q1", text: "範例試題 1" }, { id: "q2", text: "範例試題 2" }]
                },
                {
                    id: "paper_2",
                    schoolYear: "113",
                    publisher: "康軒",
                    schoolName: "明湖國中",
                    questions: [{ id: "q1", text: "範例試題 1" }]
                }
            ]
        };

        // =========================================================================
        // [MAIN COMPONENT] 수빈 테마 코어 대시보드
        // =========================================================================
        function IntegratedExamSystem() {
            const [examData, setExamData] = useState(initialExamData);
            const [isAdminMode, setIsAdminMode] = useState(true);

            const handleSaveExamPapers = (updatedPapers) => {
                setExamData(prev => ({ ...prev, examPapers: updatedPapers }));
            };

            const handleSelectUnit = (unit) => {
                alert(`📖 [單元學習] 正在進入「${unit.name}」的觀念與自我診斷模組。`);
            };

            const handleStartExamPaper = (paper) => {
                alert(`⚡ [全範圍實戰] 即將啟動 ${paper.schoolYear}學年度 [${paper.publisher}版] ${paper.schoolName} 模擬試卷！`);
            };

            return (
                <div class="max-w-6xl mx-auto px-4 py-8">
                    
                    {/* 수бин 특유의 딥 인디고 & 네온 에메랄드 상단 제어 바 */}
                    <div class="flex flex-col sm:flex-row justify-between items-center bg-[#0F172A] text-white p-5 rounded-2xl shadow-[0_10px_30px_rgba(15,23,42,0.15)] mb-8 gap-4 border border-slate-800">
                        <div class="flex items-center gap-3">
                            <span class="flex h-2.5 w-2.5 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#10B981] opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-[#10B981]"></span>
                            </span>
                            <h2 class="text-md font-bold tracking-wider text-slate-200">soobin 控制中心 <span class="text-xs text-slate-400 font-normal ml-2">V27 雙軌並列版</span></h2>
                        </div>
                        <div class="flex gap-2 bg-slate-900/80 p-1.5 rounded-xl border border-slate-800">
                            <button 
                                onClick={() => setIsAdminMode(true)} 
                                class={`px-4 py-1.5 rounded-lg font-bold text-xs transition-all ${isAdminMode ? 'bg-[#10B981] text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                            >
                                🛠️ 後台數據登錄
                            </button>
                            <button 
                                onClick={() => setIsAdminMode(false)} 
                                class={`px-4 py-1.5 rounded-lg font-bold text-xs transition-all ${!isAdminMode ? 'bg-[#4F46E5] text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                            >
                                🎓 學生大本營畫面
                            </button>
                        </div>
                    </div>

                    {isAdminMode ? (
                        <ExamPaperAdmin 
                            currentExam={examData.examTitle}
                            existingPapers={examData.examPapers}
                            onSaveExamPapers={handleSaveExamPapers}
                        />
                    ) : (
                        <ExamDashboard 
                            currentExam={examData.examTitle}
                            units={examData.units}
                            examPapers={examData.examPapers}
                            onSelectUnit={handleSelectUnit}
                            onStartExamPaper={handleStartExamPaper}
                        />
                    )}
                </div>
            );
        }

        // =========================================================================
        // [SUB COMPONENT 1] 수빈 스타일 백오피스 (학년도 입력 포함)
        // =========================================================================
        function ExamPaperAdmin({ currentExam, existingPapers, onSaveExamPapers }) {
            const [schoolYear, setSchoolYear] = useState('');
            const [publisher, setPublisher] = useState('');
            const [schoolName, setSchoolName] = useState('');
            const [jsonInput, setJsonInput] = useState('');

            const handleAddPaper = () => {
                if (!schoolYear.trim() || !publisher.trim() || !schoolName.trim() || !jsonInput.trim()) {
                    alert("⚠️ 提示：請填寫包含「學年度」在內的所有必要欄位！");
                    return;
                }

                try {
                    const parsedQuestions = JSON.parse(jsonInput);
                    const newPaper = {
                        id: `paper_${Date.now()}`,
                        schoolYear: schoolYear.trim(),
                        publisher: publisher.trim(),
                        schoolName: schoolName.trim(),
                        questions: parsedQuestions
                    };

                    onSaveExamPapers([...existingPapers, newPaper]);
                    setSchoolYear(''); setPublisher(''); setSchoolName(''); setJsonInput('');
                    alert("🎉 成功：全範圍考古題已寫入並同步至學生端平行軌道！");
                } catch (e) {
                    alert("❌ 錯誤：請確認題目資料是否為正確的 JSON 格式。");
                }
            };

            return (
                <div class="bg-white p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.02)] border border-slate-100/80">
                    <div class="border-b border-slate-100 pb-4 mb-6">
                        <h2 class="text-lg font-bold text-slate-900">🛠️ 歷屆考古題智慧發布系統</h2>
                        <p class="text-xs text-slate-400 mt-1">此處錄入之數據將以全範圍架構呈現，與個別單元互相平行，並連動自訂學年度屬性。</p>
                    </div>
                    
                    <div class="bg-slate-50/60 p-5 rounded-xl border border-slate-100 mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">學年度 (手動輸入)</label>
                                <input type="text" placeholder="例：112" value={schoolYear} onChange={(e) => setSchoolYear(e.target.value)} class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-slate-400" />
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">版本</label>
                                <input type="text" placeholder="例：翰林" value={publisher} onChange={(e) => setPublisher(e.target.value)} class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-slate-400" />
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">學校名稱</label>
                                <input type="text" placeholder="例：景美國中" value={schoolName} onChange={(e) => setSchoolName(e.target.value)} class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-slate-400" />
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">題目 JSON 資料庫</label>
                            <textarea rows="3" placeholder='[{"id":"q1","text":"內容"}]' value={jsonInput} onChange={(e) => setJsonInput(e.target.value)} class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs font-mono focus:outline-none focus:border-slate-400" />
                        </div>
                        <button onClick={handleAddPaper} class="w-full bg-[#10B981] hover:bg-[#059669] text-white font-bold text-xs py-2.5 rounded-lg transition-colors shadow-xs">
                            發布此試卷至大本營
                        </button>
                    </div>

                    <div>
                        <h3 class="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">已上線全範圍試卷清單</h3>
                        <div class="overflow-hidden rounded-xl border border-slate-100">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-slate-50 text-xs font-bold text-slate-400 border-b border-slate-100">
                                    <tr>
                                        <th class="p-3">學年度</th>
                                        <th class="p-3">版本</th>
                                        <th class="p-3">學校名稱</th>
                                        <th class="p-3">總題數</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50">
                                    {existingPapers.map((paper) => (
                                        <tr key={paper.id} class="hover:bg-slate-50/50">
                                            <td class="p-3 font-semibold text-slate-700">{paper.schoolYear}學年度</td>
                                            <td class="p-3"><span class="bg-emerald-50 text-emerald-700 text-[11px] font-bold px-2 py-0.5 rounded">{paper.publisher}版</span></td>
                                            <td class="p-3 font-bold text-slate-600">{paper.schoolName}</td>
                                            <td class="p-3 text-slate-400">{paper.questions?.length || 0} 題</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // [SUB COMPONENT 2] 수빈 대시보드 (완벽한 병렬 Brother 레이아웃 구조)
        // =========================================================================
        function ExamDashboard({ currentExam, units, examPapers, onSelectUnit, onStartExamPaper }) {
            return (
                <div class="space-y-6">
                    {/* 수빈 전용 심플라인 타이틀 */}
                    <div class="border-b border-slate-200/80 pb-4">
                        <h1 class="text-xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                            <span class="text-[#4F46E5]">🎯</span> {currentExam} 學習大本營
                        </h1>
                        <p class="text-xs text-slate-400 mt-1">核心單元微觀精熟與全範圍歷屆試卷宏觀模擬並列，提供最完整的雙軌前台視界。</p>
                    </div>

                    {/* 수빈 고유의 2열 그리드 병렬(Brother) 카드 레이아웃 */}
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        
                        {/* 왼쪽 섹션: 단원별 학습 (개념/자아진단 전용 독립 선반) */}
                        <div class="bg-white p-5 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.015)] border border-slate-100/70 flex flex-col justify-between">
                            <div>
                                <div class="flex items-center gap-2 font-bold text-slate-800 text-sm mb-4 border-b border-slate-50 pb-2">
                                    <span class="text-[#4F46E5] text-base">📖</span>
                                    <h3>進度核心：單元精熟學習</h3>
                                </div>
                                <div class="space-y-2.5">
                                    {units.map((unit) => (
                                        <div 
                                            key={unit.id} 
                                            onClick={() => onSelectUnit(unit)}
                                            class="p-4 rounded-xl border border-slate-100 bg-slate-50/40 cursor-pointer hover:bg-slate-50 transition-all flex justify-between items-center group"
                                        >
                                            <span class="font-bold text-xs text-slate-600 group-hover:text-slate-900 transition-colors">{unit.name}</span>
                                            <span class="text-[11px] font-bold text-[#4F46E5] opacity-80 group-hover:opacity-100 transition-opacity">觀念/自我診斷 →</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div class="mt-6 text-[10px] text-slate-400">※ 提示：建議先在此完成各單元重點脈絡的自學與核心診斷。</div>
                        </div>

                        {/* 오른쪽 섹션: 전범위 기출지 (단원에 포함되지 않고 나란히 배치되는 형제 구조) */}
                        <div class="bg-white p-5 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.015)] border border-slate-100/70 flex flex-col justify-between">
                            <div>
                                <div class="flex items-center gap-2 font-bold text-slate-800 text-sm mb-4 border-b border-slate-50 pb-2">
                                    <span class="text-[#F59E0B] text-base">🎯</span>
                                    <h3>實戰模擬：全範圍歷屆試卷</h3>
                                </div>
                                <div class="space-y-2.5">
                                    {examPapers.length === 0 ? (
                                        <div class="text-center py-10 text-slate-300 text-xs border border-dashed border-slate-100 rounded-xl">該範圍目前無任何考古題上線。</div>
                                    ) : (
                                        examPapers.map((paper) => (
                                            <div 
                                                key={paper.id}
                                                class="p-4 rounded-xl border border-slate-100 bg-white shadow-xs flex items-center justify-between gap-3 hover:border-slate-200 transition-all"
                                            >
                                                <div class="flex flex-wrap items-center gap-2">
                                                    {/* 백오피스에서 수동 매핑 입력받은 학년도 배지 동적 연결 */}
                                                    <span class="bg-[#F59E0B]/10 text-[#D97706] text-[10px] font-bold px-2 py-0.5 rounded border border-[#F59E0B]/20">
                                                        {paper.schoolYear}學年度
                                                    </span>
                                                    <span class="bg-slate-100 text-slate-500 text-[10px] px-1.5 py-0.5 rounded">
                                                        {paper.publisher}版
                                                    </span>
                                                    <h4 class="font-bold text-slate-700 text-xs">{paper.schoolName}</h4>
                                                    <span class="text-[10px] text-slate-300 font-mono">({paper.questions?.length || 0}題)</span>
                                                </div>
                                                <button 
                                                    onClick={() => onStartExamPaper(paper)}
                                                    class="bg-slate-900 hover:bg-slate-800 text-white font-bold text-[11px] px-3 py-1.5 rounded-lg transition-colors shadow-xs shrink-0"
                                                >
                                                    開始測驗
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                            <div class="mt-6 text-[10px] text-slate-400">※ 提示：整合整張考卷所有單元題型，考前一週實施全真計時效果最優。</div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IntegratedExamSystem />);
    </script>
</body>
</html>
